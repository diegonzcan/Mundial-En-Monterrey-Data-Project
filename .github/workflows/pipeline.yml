name: YouTube Data Pipeline

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download es_core_news_sm

      - name: Set up GCP credentials
        run: |
          mkdir -p src/credentials
          printf '%s' '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > src/credentials/service-account.json

      - name: Run pipeline
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: src/credentials/service-account.json
        run: |
          cd ${{ github.workspace }}
          python src/pipeline.py

      - name: Upload dashboard JSON
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-json
          path: apps/data/*.json
          if-no-files-found: warn

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: |
            data/
            src/dashboard/data/
            *.log
