<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Arquitectura e infraestructura de Mundial Trend Radar</title>
  <desc id="desc">Diagrama del flujo de YouTube API hacia extraccion local, Parquet, Google Cloud Storage, BigQuery RAW, BigQuery SILVER, BigQuery GOLD, topic modeling, dashboard JSON, dashboard estatico y Netlify.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.52" stop-color="#0b1728"/>
      <stop offset="1" stop-color="#06101d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101d31"/>
      <stop offset="1" stop-color="#0b1627"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#39d6b5"/>
    </marker>
    <style>
      .title { fill: #eef5ff; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 52px; font-weight: 800; letter-spacing: 0; }
      .panel-title { fill: #39d6b5; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 24px; font-weight: 800; }
      .box-title { fill: #eef5ff; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 23px; font-weight: 750; }
      .box-sub { fill: #9fb0c7; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 600; }
      .small { fill: #c7d3e6; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 17px; font-weight: 650; }
      .panel { fill: url(#panel); stroke: rgba(57,214,181,0.62); stroke-width: 2; rx: 18; filter: url(#shadow); }
      .box { fill: rgba(255,255,255,0.035); stroke: rgba(106,168,255,0.65); stroke-width: 2; rx: 14; }
      .box-alt { fill: rgba(57,214,181,0.06); stroke: rgba(57,214,181,0.72); stroke-width: 2; rx: 14; }
      .box-purple { fill: rgba(167,139,250,0.07); stroke: rgba(167,139,250,0.75); stroke-width: 2; rx: 14; }
      .arrow { fill: none; stroke: #39d6b5; stroke-width: 4; marker-end: url(#arrow); }
      .arrow-blue { fill: none; stroke: #6aa8ff; stroke-width: 4; marker-end: url(#arrow); }
      .chip { fill: rgba(57,214,181,0.10); stroke: rgba(57,214,181,0.45); stroke-width: 1.4; rx: 9; }
      .icon { fill: #39d6b5; opacity: 0.95; }
      .icon-blue { fill: #6aa8ff; opacity: 0.95; }
      .icon-purple { fill: #a78bfa; opacity: 0.95; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="800" y="78" text-anchor="middle" class="title">Mundial Trend Radar</text>

  <rect x="35" y="125" width="280" height="690" class="panel"/>
  <rect x="345" y="125" width="280" height="690" class="panel" stroke="#6aa8ff"/>
  <rect x="655" y="125" width="280" height="690" class="panel" stroke="#6aa8ff"/>
  <rect x="965" y="125" width="300" height="690" class="panel" stroke="#a78bfa"/>
  <rect x="1295" y="125" width="270" height="690" class="panel"/>

  <text x="175" y="165" text-anchor="middle" class="panel-title">Ingesta</text>
  <text x="485" y="165" text-anchor="middle" class="panel-title">Almacenamiento</text>
  <text x="795" y="165" text-anchor="middle" class="panel-title">Transformacion</text>
  <text x="1115" y="165" text-anchor="middle" class="panel-title">Analitica</text>
  <text x="1430" y="165" text-anchor="middle" class="panel-title">Visualizacion</text>

  <rect x="70" y="220" width="210" height="74" class="box-alt"/>
  <text x="175" y="252" text-anchor="middle" class="box-title">YouTube API</text>
  <text x="175" y="276" text-anchor="middle" class="box-sub">videos, comments, channels</text>

  <rect x="70" y="355" width="210" height="82" class="box-alt"/>
  <text x="175" y="391" text-anchor="middle" class="box-title">Extraccion local</text>
  <text x="175" y="416" text-anchor="middle" class="box-sub">Python + run_date</text>

  <rect x="70" y="520" width="210" height="52" class="chip"/>
  <text x="175" y="553" text-anchor="middle" class="small">videos</text>
  <rect x="70" y="590" width="210" height="52" class="chip"/>
  <text x="175" y="623" text-anchor="middle" class="small">comments</text>
  <rect x="70" y="660" width="210" height="52" class="chip"/>
  <text x="175" y="693" text-anchor="middle" class="small">channels</text>

  <line x1="175" y1="294" x2="175" y2="344" class="arrow"/>
  <line x1="175" y1="437" x2="175" y2="502" class="arrow"/>

  <rect x="390" y="235" width="190" height="115" class="box"/>
  <path d="M455 255 h58 l32 32 v45 h-90 z M513 255 v32 h32" fill="none" stroke="#39d6b5" stroke-width="6"/>
  <text x="485" y="385" text-anchor="middle" class="box-title">Parquet</text>
  <text x="485" y="412" text-anchor="middle" class="box-sub">data/parquet/{run_date}</text>

  <rect x="390" y="500" width="190" height="120" class="box"/>
  <ellipse cx="485" cy="526" rx="55" ry="20" fill="#6aa8ff" opacity="0.88"/>
  <path d="M430 526 v64 c0 13 25 24 55 24 s55-11 55-24 v-64" fill="#6aa8ff" opacity="0.42"/>
  <text x="485" y="655" text-anchor="middle" class="box-title">Google Cloud</text>
  <text x="485" y="682" text-anchor="middle" class="box-title">Storage</text>

  <line x1="280" y1="396" x2="370" y2="396" class="arrow"/>
  <line x1="485" y1="350" x2="485" y2="486" class="arrow"/>

  <rect x="695" y="220" width="200" height="90" class="box"/>
  <circle cx="735" cy="265" r="26" class="icon-blue"/>
  <text x="793" y="257" text-anchor="middle" class="box-title">BigQuery RAW</text>
  <text x="793" y="283" text-anchor="middle" class="box-sub">videos_raw, comments_raw</text>

  <rect x="695" y="410" width="200" height="96" class="box"/>
  <circle cx="735" cy="458" r="26" class="icon-blue"/>
  <text x="800" y="450" text-anchor="middle" class="box-title">BigQuery SILVER</text>
  <text x="800" y="477" text-anchor="middle" class="box-sub">MERGE + dedupe</text>

  <rect x="695" y="610" width="200" height="96" class="box"/>
  <circle cx="735" cy="658" r="26" class="icon-blue"/>
  <text x="800" y="650" text-anchor="middle" class="box-title">BigQuery GOLD</text>
  <text x="800" y="677" text-anchor="middle" class="box-sub">metricas + topics</text>

  <line x1="580" y1="560" x2="680" y2="458" class="arrow-blue"/>
  <line x1="795" y1="310" x2="795" y2="398" class="arrow-blue"/>
  <line x1="795" y1="506" x2="795" y2="598" class="arrow-blue"/>

  <rect x="1005" y="210" width="220" height="75" class="box-purple"/>
  <text x="1115" y="242" text-anchor="middle" class="box-title">Topic Modeling</text>
  <text x="1115" y="268" text-anchor="middle" class="box-sub">macro temas + sub-temas</text>

  <rect x="1005" y="330" width="220" height="130" class="box-purple"/>
  <text x="1115" y="365" text-anchor="middle" class="small">videos_daily</text>
  <text x="1115" y="400" text-anchor="middle" class="small">comments_current</text>
  <text x="1115" y="435" text-anchor="middle" class="small">channels_daily</text>

  <rect x="1005" y="500" width="220" height="90" class="box-purple"/>
  <text x="1115" y="535" text-anchor="middle" class="small">video_momentum</text>
  <text x="1115" y="570" text-anchor="middle" class="small">video_discovery</text>

  <rect x="1005" y="630" width="220" height="110" class="box-purple"/>
  <text x="1115" y="670" text-anchor="middle" class="small">topic_daily</text>
  <text x="1115" y="705" text-anchor="middle" class="small">topic_trends_daily</text>

  <line x1="895" y1="265" x2="990" y2="365" class="arrow-blue"/>
  <line x1="895" y1="458" x2="990" y2="545" class="arrow-blue"/>
  <line x1="895" y1="658" x2="990" y2="685" class="arrow-blue"/>
  <line x1="1115" y1="285" x2="1115" y2="318" class="arrow"/>

  <rect x="1330" y="230" width="200" height="82" class="box-alt"/>
  <text x="1430" y="262" text-anchor="middle" class="box-title">Dashboard JSON</text>
  <text x="1430" y="288" text-anchor="middle" class="box-sub">apps/data/*.json</text>

  <rect x="1330" y="390" width="200" height="82" class="box-alt"/>
  <text x="1430" y="424" text-anchor="middle" class="box-title">Static Dashboard</text>
  <text x="1430" y="450" text-anchor="middle" class="box-sub">Chart.js + HTML</text>

  <rect x="1330" y="560" width="200" height="82" class="box-alt"/>
  <text x="1430" y="594" text-anchor="middle" class="box-title">Netlify</text>
  <text x="1430" y="620" text-anchor="middle" class="box-sub">deploy estatico</text>

  <line x1="1225" y1="247" x2="1315" y2="270" class="arrow"/>
  <line x1="1430" y1="312" x2="1430" y2="376" class="arrow"/>
  <line x1="1430" y1="472" x2="1430" y2="546" class="arrow"/>

  <text x="800" y="850" text-anchor="middle" class="box-sub">Pipeline idempotente por run_date: Raw reemplaza, Silver hace MERGE, Gold elimina/inserta y JSON se sobrescribe.</text>
</svg>
